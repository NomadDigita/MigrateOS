services:
  - type: web
    name: migrateos-api
    runtime: python
    buildCommand: pip install "poetry==2.1.3" && poetry install --only main --no-interaction --no-ansi
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    autoDeploy: true
