[alembic]
# Resolve the migration directory relative to this configuration file.  Render
# launches Alembic from the repository root, while local tooling may be run
# from another working directory.
script_location = %(here)s/alembic
prepend_sys_path = .
sqlalchemy.url = postgresql+psycopg://migrateos:migrateos@localhost:5432/migrateos

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
